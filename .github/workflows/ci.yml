name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      - name: Clippy (correctness lints only)
        run: cargo clippy --workspace -- -D clippy::correctness -W clippy::suspicious
